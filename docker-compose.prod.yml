# Production stack for kagency.dev
# App (Next.js + Payload) and MongoDB run in Docker; the host nginx terminates TLS
# and proxies https://kagency.dev -> 127.0.0.1:3003.
#
# Bring up:   sudo docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# Restore DB: sudo docker cp <snapshot> kagency-mongo-1:/tmp/r.gz && \
#             sudo docker exec kagency-mongo-1 mongorestore --archive=/tmp/r.gz --gzip --drop --nsInclude='kagency.*'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Internal only — no host port published. Reachable as mongodb://mongo:27017 inside the compose network.

  cms:
    image: node:22-alpine
    working_dir: /app
    # NOTE: build tooling (tailwind/postcss/next) lives in devDependencies, so we must
    # install with --include=dev. Do NOT set NODE_ENV=production here or npm ci omits them.
    # Build only when there is no build yet (.next empty). Deploys build IN-PLACE
    # (`docker exec … npm run build`) while the old server is still serving, so
    # data-dependent pages prerender against a live API instead of 404. A plain
    # restart/reboot then reuses that good build instead of cold-rebuilding.
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null)\" ]; then npm ci --include=dev; fi;
      if [ ! -d .next ] || [ -z \"$$(ls -A .next 2>/dev/null)\" ]; then npm run build; fi;
      npm run start -- --hostname 0.0.0.0 --port 3000"
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: mongodb://mongo:27017/kagency
    ports:
      # Bind to loopback only — host nginx is the public entrypoint.
      - '127.0.0.1:3003:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const net=require(\"net\");const s=net.connect(3000,\"127.0.0.1\");s.on(\"connect\",()=>{s.end();process.exit(0)});s.on(\"error\",()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"',
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    volumes:
      - ./:/app
      - cms_node_modules:/app/node_modules
    depends_on:
      - mongo

volumes:
  mongo_data:
  cms_node_modules:
